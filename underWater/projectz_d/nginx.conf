upstream wsgi_backend {
    server localhost:8000;
    keepalive 32;
}

upstream asgi_backend {
    server localhost:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # Standard HTTP traffic → WSGI (Gunicorn on port 8000)
    location / {
        proxy_pass http://wsgi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # WebSocket traffic → ASGI (Uvicorn on port 9000)
    location /ws/ {
        proxy_pass http://asgi_backend;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers (CRITICAL)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prevent 60s timeout on idle WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # Static files → WSGI (can also be served by Nginx directly if needed)
    location /static/ {
        proxy_pass http://wsgi_backend;
        proxy_cache_valid 200 60d;
        expires 60d;
    }
}
