upstream wsgi_backend {
    # WSGI server (Gunicorn) - synchronous HTTP requests
    server web:8000 max_fails=3 fail_timeout=30s;
}

upstream asgi_backend {
    # ASGI server (Uvicorn) - asynchronous WebSocket connections
    server asgi:9000 max_fails=3 fail_timeout=30s;
}

# Rate limiting
limit_req_status 429;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # ====================================================================
    # STATIC ASSETS
    # ====================================================================
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ====================================================================
    # HEALTH CHECKS
    # ====================================================================
    location /health/ {
        access_log off;
        proxy_pass http://wsgi_backend;
    }

    # ====================================================================
    # API ENDPOINTS (WSGI/HTTP)
    # ====================================================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        
        proxy_pass http://wsgi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts for API requests
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ====================================================================
    # DJANGO ADMIN & AUTHENTICATION (WSGI/HTTP)
    # ====================================================================
    location /admin/ {
        limit_req zone=general burst=20 nodelay;
        
        proxy_pass http://wsgi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /login {
        limit_req zone=general burst=10 nodelay;
        
        proxy_pass http://wsgi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ====================================================================
    # WEBSOCKET ENDPOINTS (ASGI/Async)
    # ====================================================================
    # Real-time data and alerts
    location /ws/realtime/ {
        limit_req zone=ws burst=100 nodelay;
        
        # Upgrade to WebSocket protocol
        proxy_pass http://asgi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prevent Nginx from closing idle WebSocket connections
        # Set to 24 hours - adjust based on your needs
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        
        # No buffering for WebSocket
        proxy_buffering off;
        
        # Keep connection alive
        proxy_set_header Connection "";
    }

    # Alerts alias (frontend default)
    location /ws/alerts/ {
        limit_req zone=ws burst=100 nodelay;

        # Upgrade to WebSocket protocol
        proxy_pass http://asgi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent Nginx from closing idle WebSocket connections
        # Set to 24 hours - adjust based on your needs
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # No buffering for WebSocket
        proxy_buffering off;

        # Keep connection alive
        proxy_set_header Connection "";
    }

    # User notifications
    location /ws/notifications/ {
        limit_req zone=ws burst=100 nodelay;
        
        proxy_pass http://asgi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # Generic WebSocket endpoint
    location ~ ^/ws/ {
        limit_req zone=ws burst=100 nodelay;
        
        proxy_pass http://asgi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # ====================================================================
    # FALLBACK TO WSGI (HTTP)
    # ====================================================================
    # All other requests go to the WSGI server
    location / {
        limit_req zone=general burst=20 nodelay;
        
        proxy_pass http://wsgi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ====================================================================
    # ERROR PAGES
    # ====================================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

